<div class="admin-section">
  <div class="section-header">
    <div>
      <h1 class="section-title"><i class="pi pi-map"></i> Tours</h1>
      <p class="section-sub">Gestiona los tours y giras de artistas</p>
    </div>
    <p-button label="Nuevo tour" icon="pi pi-plus" styleClass="btn-admin-primary" (onClick)="abrirCrear()"></p-button>
  </div>

  <div class="admin-form-card" *ngIf="mostrarFormulario">
    <h2 class="form-title">{{ modoEdicion ? 'Editar tour' : 'Nuevo tour' }}</h2>
    <div class="form-grid">

      <div class="field">
        <label>Nombre del tour *</label>
        <input pInputText [(ngModel)]="formulario.nombreTour" placeholder="Ej: World Tour 2025" />
      </div>

      <div class="field">
        <label>Artista</label>
<!--
        <input pInputText [(ngModel)]="formulario.artista" placeholder="Nombre del artista" />
-->
      </div>

      <div class="field">
        <label>Fecha inicial</label>
        <p-datepicker [(ngModel)]="formulario.fechaInicial" dateFormat="dd/mm/yy" placeholder="DD/MM/AAAA" styleClass="w-full"></p-datepicker>
      </div>

      <div class="field">
        <label>Fecha final</label>
        <p-datepicker [(ngModel)]="formulario.fechaFinal" dateFormat="dd/mm/yy" placeholder="DD/MM/AAAA" styleClass="w-full"></p-datepicker>
      </div>

      <div class="field field--full">
        <label>Descripción</label>
        <textarea pTextarea [(ngModel)]="formulario.descripcionTour" placeholder="Descripción del tour..." rows="3"></textarea>
      </div>

      <div class="field field--full">
        <label>URL imagen del tour</label>
        <input pInputText [(ngModel)]="formulario.imagenTour" placeholder="https://..." />
      </div>

    </div>
    <div class="form-actions">
      <p-button label="Cancelar" icon="pi pi-times" styleClass="btn-admin-outline" (onClick)="cancelar()"></p-button>
      <p-button [label]="modoEdicion ? 'Guardar cambios' : 'Crear tour'" icon="pi pi-check" styleClass="btn-admin-primary" (onClick)="guardar()"></p-button>
    </div>
  </div>

  <div class="admin-table-card">
    <p-table [value]="tours" [paginator]="tours.length > 8" [rows]="8" styleClass="admin-table" emptyMessage="No hay tours registrados aún.">
      <ng-template pTemplate="header">
        <tr>
          <th>Nombre</th>
          <th>Artista</th>
          <th>Fecha inicial</th>
          <th>Fecha final</th>
          <th>Acciones</th>
        </tr>
      </ng-template>
      <ng-template pTemplate="body" let-t>
        <tr>
          <td><strong>{{ t.nombreTour }}</strong></td>
          <td>{{ t.artista || '—' }}</td>
          <td>{{ formatFecha(t.fechaInicial) }}</td>
          <td>{{ formatFecha(t.fechaFinal) }}</td>
          <td>
            <div class="table-actions">
              <button class="action-btn edit" (click)="abrirEditar(t)"><i class="pi pi-pencil"></i></button>
              <button class="action-btn delete" (click)="eliminar(t.idTour!)"><i class="pi pi-trash"></i></button>
            </div>
          </td>
        </tr>
      </ng-template>
    </p-table>
  </div>
</div>
