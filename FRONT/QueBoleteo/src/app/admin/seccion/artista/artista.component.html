<div class="admin-section">

  <!-- Encabezado -->
  <div class="section-header">
    <div>
      <h1 class="section-title"><i class="pi pi-microphone"></i> Artistas</h1>
      <p class="section-sub">Gestiona los artistas registrados en la plataforma</p>
    </div>
    <p-button
      label="Nuevo artista"
      icon="pi pi-plus"
      styleClass="btn-admin-primary"
      (onClick)="abrirCrear()">
    </p-button>
  </div>

  <!-- Formulario -->
  <div class="admin-form-card" *ngIf="mostrarFormulario">
    <h2 class="form-title">{{ modoEdicion ? 'Editar artista' : 'Nuevo artista' }}</h2>

    <div class="form-grid">

      <div class="field">
        <label>Nombre del artista *</label>
        <input pInputText [(ngModel)]="formulario.nombre" placeholder="Nombre artístico" />
      </div>

      <div class="field">
        <label>Tipo *</label>
        <p-select
          [(ngModel)]="formulario.tipo"
          [options]="tipos"
          optionLabel="label"
          optionValue="value"
          placeholder="Individual o Grupo"
          styleClass="w-full">
        </p-select>
      </div>

      <div class="field">
        <label>Género musical *</label>
        <p-select
          [(ngModel)]="formulario.genero"
          [options]="generos"
          optionLabel="label"
          optionValue="value"
          placeholder="Selecciona un género"
          styleClass="w-full">
        </p-select>
      </div>

      <div class="field">
        <label>País de origen</label>
        <input pInputText [(ngModel)]="formulario.pais" placeholder="Ej: Colombia" />
      </div>

      <div class="field field--full">
        <label>Descripción</label>
        <textarea
          pTextarea
          [(ngModel)]="formulario.descripcion"
          placeholder="Breve descripción del artista..."
          rows="3">
        </textarea>
      </div>

    </div>

    <div class="form-actions">
      <p-button
        label="Cancelar"
        icon="pi pi-times"
        styleClass="btn-admin-outline"
        (onClick)="cancelar()">
      </p-button>
      <p-button
        [label]="modoEdicion ? 'Guardar cambios' : 'Crear artista'"
        icon="pi pi-check"
        styleClass="btn-admin-primary"
        (onClick)="guardar()">
      </p-button>
    </div>
  </div>

  <!-- Tabla -->
  <div class="admin-table-card">
    <p-table
      [value]="artistas"
      [paginator]="artistas.length > 8"
      [rows]="8"
      styleClass="admin-table">

      <ng-template pTemplate="header">
        <tr>
          <th>Nombre</th>
          <th>Tipo</th>
          <th>Género</th>
          <th>País</th>
          <th>Acciones</th>
        </tr>
      </ng-template>

      <ng-template pTemplate="body" let-artista>
        <tr>
          <td><strong>{{ artista.nombre }}</strong></td>
          <td>{{ artista.tipo }}</td>
          <td>
            <span class="genre-badge">{{ artista.genero }}</span>
          </td>
          <td>{{ artista.pais || '—' }}</td>
          <td>
            <div class="table-actions">
              <button class="action-btn edit" (click)="abrirEditar(artista)">
                <i class="pi pi-pencil"></i>
              </button>
              <button class="action-btn delete" (click)="eliminar(artista.id)">
                <i class="pi pi-trash"></i>
              </button>
            </div>
          </td>
        </tr>
      </ng-template>

    </p-table>
  </div>

</div>
