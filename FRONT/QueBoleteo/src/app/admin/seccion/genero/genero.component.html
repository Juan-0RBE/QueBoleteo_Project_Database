<div class="admin-section">

  <!-- Encabezado -->
  <div class="section-header">
    <div>
      <h1 class="section-title"><i class="pi pi-microphone"></i> Generos</h1>
      <p class="section-sub">Gestiona los generos registrados en la plataforma</p>
    </div>
    <p-button
      label="Nuevo Genero"
      icon="pi pi-plus"
      styleClass="btn-admin-primary"
      (onClick)="abrirCrear()">
    </p-button>
  </div>

  <!-- Formulario -->
  <div class="admin-form-card" *ngIf="mostrarFormulario">
    <h2 class="form-title">{{ modoEdicion ? 'Editar genero' : 'Nuevo genero' }}</h2>

    <div class="form-grid">

      <div class="field">
        <label>Nombre del genero *</label>
        <input pInputText [(ngModel)]="formulario.nombreGenero" placeholder="Nombre genero" />
      </div>
    </div>

    <!-- PARA ERRORES -->

    <small *ngIf="errorMsg"   class="p-error">{{ errorMsg }}</small>
    <small *ngIf="successMsg" style="color: green">{{ successMsg }}</small>



    <div class="form-actions">
      <p-button
        label="Cancelar"
        icon="pi pi-times"
        styleClass="btn-admin-outline"
        (onClick)="cancelar()">
      </p-button>
      <p-button
        [label]="modoEdicion ? 'Guardar cambios' : 'Crear genero'"
        icon="pi pi-check"
        styleClass="btn-admin-primary"
        (onClick)="guardar()">
      </p-button>
    </div>
  </div>

  <!-- Tabla -->
  <div class="admin-table-card">
    <p-table
      [value]="generos"
      [paginator]="generos.length > 8"
      [rows]="8"
      styleClass="admin-table">

      <ng-template pTemplate="header">
        <tr>
          <th>Nombre</th>
        </tr>
      </ng-template>

      <ng-template pTemplate="body" let-genero>
        <tr>
          <td><strong>{{ genero.nombreGenero }}</strong></td>
          <td>
            <div class="table-actions">
              <button class="action-btn edit" (click)="abrirEditar(genero)">
                <i class="pi pi-pencil"></i>
              </button>
              <button class="action-btn delete" (click)="eliminar(genero.idGenero!)">
                <i class="pi pi-trash"></i>
              </button>
            </div>
          </td>
        </tr>
      </ng-template>

    </p-table>
  </div>

</div>
