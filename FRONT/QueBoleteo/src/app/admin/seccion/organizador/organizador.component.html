<div class="admin-section">
  <div class="section-header">
    <div>
      <h1 class="section-title"><i class="pi pi-briefcase"></i> Organizadores</h1>
      <p class="section-sub">Gestiona las empresas y personas que organizan los eventos</p>
    </div>
    <p-button label="Nuevo organizador" icon="pi pi-plus" styleClass="btn-admin-primary" (onClick)="abrirCrear()"></p-button>
  </div>

  <div class="admin-form-card" *ngIf="mostrarFormulario">
    <h2 class="form-title">{{ modoEdicion ? 'Editar organizador' : 'Nuevo organizador' }}</h2>
    <div class="form-grid">

      <div class="field">
        <label>Nombre del organizador *</label>
        <input pInputText [(ngModel)]="formulario.nombreOrganizador" placeholder="Ej: Live Nation Colombia" />
      </div>

      <div class="field">
        <label>Correo de contacto</label>
        <input pInputText type="email" [(ngModel)]="formulario.correoOrganizador" placeholder="contacto@organizador.com" />
      </div>

      <div class="field field--full">
        <label>URL del logo</label>
        <input pInputText [(ngModel)]="formulario.logo" placeholder="https://..." />
      </div>


      <!-- PARA ERRORES -->

      <small *ngIf="errorMsg"   class="p-error">{{ errorMsg }}</small>
      <small *ngIf="successMsg" style="color: green">{{ successMsg }}</small>


    </div>
    <div class="form-actions">
      <p-button label="Cancelar" icon="pi pi-times" styleClass="btn-admin-outline" (onClick)="cancelar()"></p-button>
      <p-button [label]="modoEdicion ? 'Guardar cambios' : 'Crear organizador'" icon="pi pi-check" styleClass="btn-admin-primary" (onClick)="guardar()"></p-button>
    </div>
  </div>

  <div class="admin-table-card">
    <p-table [value]="organizadores" [paginator]="organizadores.length > 8" [rows]="8" styleClass="admin-table" emptyMessage="No hay organizadores registrados aún.">
      <ng-template pTemplate="header">
        <tr>
          <th>Nombre</th>
          <th>Correo</th>
          <th>Acciones</th>
        </tr>
      </ng-template>
      <ng-template pTemplate="body" let-organizador>
        <tr>
          <td><strong>{{ organizador.nombreOrganizador }}</strong></td>
          <td>{{ organizador.correoOrganizador || '—' }}</td>
          <td>
            <div class="table-actions">
              <button class="action-btn edit" (click)="abrirEditar(organizador)"><i class="pi pi-pencil"></i></button>
              <button class="action-btn delete" (click)="eliminar(organizador.nombreOrganizador)"><i class="pi pi-trash"></i></button>
            </div>
          </td>
        </tr>
      </ng-template>
    </p-table>
  </div>
</div>
