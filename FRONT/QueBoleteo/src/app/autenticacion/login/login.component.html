<div class="auth-wrapper">
  <div class="auth-card">

    <!-- Titulo -->
    <div class="auth-brand">
      <div class="brand-icon">
        <i class="pi pi-ticket"></i>
      </div>
      <h1>Bienvenido a <span>QueBoleteo</span></h1>
      <p>Inicia sesión para acceder a tus boletas y eventos</p>
    </div>

    <!-- Username -->
    <div class="field">
      <label for="username">Nombre de Usuario</label>
      <span class="p-iconfield w-full">
        <i class="pi pi-user p-inputicon"></i>
        <input
          pInputText
          id="username"
          type="text"
          placeholder="Nombre de Usuario"
          [(ngModel)]="credentials.nombreUsuario"
          class="w-full"
        />
      </span>
    </div>

    <!-- Contraseña -->
    <div class="field">
      <label for="password">Contraseña</label>
      <p-password
        inputId="password"
        placeholder="••••••••"
        [feedback]="false"
        [toggleMask]="true"
        styleClass="w-full"
        inputStyleClass="w-full"
        [(ngModel)]="credentials.clave">
      </p-password>
    </div>


    <!-- Para mostrar errores -->
    <small *ngIf="errorMsg" class="p-error">{{ errorMsg }}</small>

    <!-- Submit -->
    <p-button
      type="submit"
      label="Iniciar sesión"
      icon="pi pi-sign-in"
      iconPos="right"
      styleClass="btn-auth"
      (onClick)="onLogin()" [loading]="loading">
    </p-button>

    <!-- Footer -->
    <div class="auth-footer">
      ¿No tienes cuenta?
      <a routerLink="/autenticacion/registro">Regístrate aquí</a>
    </div>

  </div>
</div>
