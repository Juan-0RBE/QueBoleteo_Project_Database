<div class="auth-wrapper">
  <div class="auth-card auth-card--wide">

    <!-- Titulo -->
    <div class="auth-brand">
      <div class="brand-icon">
        <i class="pi pi-ticket"></i>
      </div>
      <h1>Únete a <span>QueBoleteo</span></h1>
      <p>Crea tu cuenta y no te pierdas ningún concierto</p>
    </div>

    <!--Primer nombre + Segundo nombre-->
    <div class="field-row">

      <div class="field">
        <label for="primerNombre">Primer nombre</label>
        <span class="p-input-icon-left w-full">
          <i class="pi pi-user"></i>
          <input
            pInputText
            id="primerNombre"
            placeholder="Juan"
          />
        </span>
      </div>

      <div class="field">
        <label for="segundoNombre">Segundo nombre</label>
        <span class="p-input-icon-left w-full">
          <i class="pi pi-user"></i>
          <input
            pInputText
            id="segundoNombre"
            placeholder="Carlos (opcional)"
          />
        </span>
      </div>

    </div>

    <!--Primer apellido + Segundo apellido-->
    <div class="field-row">

      <div class="field">
        <label for="primerApellido">Primer apellido</label>
        <span class="p-input-icon-left w-full">
          <i class="pi pi-user"></i>
          <input
            pInputText
            id="primerApellido"
            placeholder="Pérez"
          />
        </span>
      </div>

      <div class="field">
        <label for="segundoApellido">Segundo apellido</label>
        <span class="p-input-icon-left w-full">
          <i class="pi pi-user"></i>
          <input
            pInputText
            id="segundoApellido"
            placeholder="García (opcional)"
          />
        </span>
      </div>

    </div>

    <!--Documento + Correo electrónico-->
    <div class="field-row">

      <div class="field">
        <label for="documentId">Documento de identidad</label>
        <span class="p-input-icon-left w-full">
          <i class="pi pi-id-card"></i>
          <input
            pInputText
            id="documentId"
            placeholder="12345678"
          />
        </span>
      </div>

      <div class="field">
        <label for="email">Correo electrónico</label>
        <span class="p-input-icon-left w-full">
          <i class="pi pi-envelope"></i>
          <input
            pInputText
            id="email"
            type="email"
            placeholder="tu@correo.com"
          />
        </span>
      </div>

    </div>

    <!--Teléfono + Fecha de nacimiento-->
    <div class="field-row">

      <div class="field">
        <label for="phone">Teléfono</label>
        <span class="p-input-icon-left w-full">
          <i class="pi pi-phone"></i>
          <p-inputMask
            inputId="phone"
            mask="(999) 999-9999"
            placeholder="(300) 000-0000"
            styleClass="w-full">
          </p-inputMask>
        </span>
      </div>

      <div class="field">
        <label for="birthDate">Fecha de nacimiento</label>
        <p-datepicker
          inputId="birthDate"
          [maxDate]="maxDate"
          dateFormat="dd/mm/yy"
          placeholder="DD/MM/AAAA"
          styleClass="w-full">
        </p-datepicker>
      </div>

    </div>

    <!--Contraseña + Confirmar-->
    <div class="field-row">

      <div class="field">
        <label for="password">Contraseña</label>
        <p-password
          inputId="password"
          placeholder="Mínimo 8 caracteres"
          [toggleMask]="true"
          [feedback]="true"
          styleClass="w-full"
          promptLabel="Ingresa una contraseña"
          weakLabel="Débil"
          mediumLabel="Media"
          strongLabel="Fuerte">
        </p-password>
      </div>

      <div class="field">
        <label for="confirmPassword">Confirmar contraseña</label>
        <p-password
          inputId="confirmPassword"
          placeholder="Repite tu contraseña"
          [toggleMask]="true"
          [feedback]="false"
          styleClass="w-full">
        </p-password>
      </div>

    </div>

    <!-- Submit -->
    <p-button
      type="submit"
      label="Crear cuenta"
      icon="pi pi-user-plus"
      iconPos="right"
      styleClass="btn-auth">
    </p-button>

    <!-- Footer -->
    <div class="auth-footer">
      ¿Ya tienes cuenta?
      <a routerLink="/autenticacion/login">Inicia sesión</a>
    </div>

  </div>
</div>
