<div class="auth-wrapper">
  <div class="auth-card">

    <!-- Titulo -->
    <div class="auth-brand">
      <div class="brand-icon">
        <i class="pi pi-ticket"></i>
      </div>
      <h1>Bienvenido a <span>QueBoleteo</span></h1>
      <p>Inicia sesión para acceder a tus boletas y eventos</p>
    </div>

    <!-- Email -->
    <div class="field">
      <label for="email">Correo electrónico</label>
      <span class="p-input-icon-left w-full">
        <i class="pi pi-envelope"></i>
        <input
          pInputText
          id="email"
          type="email"
          placeholder="tu@correo.com"
        />
      </span>
    </div>

    <!-- Contraseña -->
    <div class="field">
      <label for="password">Contraseña</label>
      <p-password
        inputId="password"
        placeholder="••••••••"
        [feedback]="false"
        [toggleMask]="true"
        styleClass="w-full">
      </p-password>
    </div>

    <!-- Submit -->
    <p-button
      type="submit"
      label="Iniciar sesión"
      icon="pi pi-sign-in"
      iconPos="right"
      styleClass="btn-auth">
    </p-button>

    <!-- Footer -->
    <div class="auth-footer">
      ¿No tienes cuenta?
      <a routerLink="/autenticacion/registro">Regístrate aquí</a>
    </div>

  </div>
</div>
